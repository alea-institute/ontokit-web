name: Setup Node.js
description: Setup Node.js and install dependencies

inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: '24'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
    - run: npm ci
      shell: bash
