name: Distribution

on:
  push:
    branches-ignore: [renovate/**]
    tags: [ontokit-web-*]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  publish_github:
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/ontokit-web-')
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true

  publish_docker:
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/ontokit-web-')
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ontokit-web
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }},prefix=ontokit-web-
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }},prefix=ontokit-web-
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_WS_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max
